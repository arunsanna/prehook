name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # cosign keyless signing

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read

  release:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign checksums
        run: cosign sign-blob --yes dist/checksums.txt --output-signature dist/checksums.txt.sig
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Generate SBOM
        run: syft dir:. -o spdx-json=dist/prehook.sbom.spdx.json

      - name: Attach signing + SBOM artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist/checksums.txt.sig dist/prehook.sbom.spdx.json --clobber
